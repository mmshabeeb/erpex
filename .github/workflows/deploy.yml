name: Deploy ERPEX to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '20'
  SSH_PORT: 65002
  BACKEND_DIR: /home/u127271988/domains/mizusubeauty.com/nodejs
  DB_DIR: /home/u127271988/domains/mizusubeauty.com/db

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build Monorepo (Shared, Backend, Frontend)
        run: npm run build
        env:
          VITE_API_URL: https://www.elevatexnow.com/erpex/api

      - name: 🗂️ Generate Prisma Client
        run: cd packages/backend && npx prisma generate

      - name: 📦 Prepare deployment package
        run: |
          mkdir -p deploy

          # Recreate package structure for workspace installation
          mkdir -p deploy/packages/backend
          cp -r packages/backend/dist deploy/packages/backend/dist
          cp -r packages/backend/prisma deploy/packages/backend/prisma
          cp packages/backend/package.json deploy/packages/backend/

          mkdir -p deploy/packages/shared
          cp -r packages/shared/dist deploy/packages/shared/dist
          cp packages/shared/package.json deploy/packages/shared/

          # Frontend static files (served by the backend via express.static)
          mkdir -p deploy/packages/frontend
          cp -r packages/frontend/dist deploy/packages/frontend/dist
          cp packages/frontend/package.json deploy/packages/frontend/

          # Root configs
          cp package.json deploy/
          cp package-lock.json deploy/
          cp deploy.sh deploy/

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🚀 Deploy to Hostinger
        run: |
          SSH_OPTS="-i ~/.ssh/id_rsa -p ${{ env.SSH_PORT }} -o StrictHostKeyChecking=no"

          # Frontend build output (pure build artifacts, safe to prune stale files)
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            deploy/packages/frontend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.BACKEND_DIR }}/packages/frontend/dist/

          # Backend application (no --delete: preserves .env, node_modules, tmp/, etc.)
          rsync -avz \
            -e "ssh $SSH_OPTS" \
            deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.BACKEND_DIR }}/

          # Run deployment script on server
          ssh $SSH_OPTS \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ env.BACKEND_DIR }} && chmod +x deploy.sh && DB_DIR=${{ env.DB_DIR }} bash deploy.sh"

      - name: ✅ Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://mizusubeauty.com/erpex/api/health || echo "000")

          if [ "$STATUS" = "200" ]; then
            echo "✅ API is healthy (HTTP 200)"
          else
            echo "⚠️ API returned HTTP $STATUS — check server logs / Node.js app logs in hPanel"
          fi

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
