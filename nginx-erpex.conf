# ─── Option B: Full standalone server block ──────────────────
# Use this only if you DON'T have an existing config for elevatexnow.com

server {
    listen 80;
    server_name www.elevatexnow.com elevatexnow.com;

    # Existing site root (if any)
    root /var/www/elevatexnow;
    index index.html index.php;

    # ERPEX Frontend — static files served from /erpex
    location /erpex {
        root /var/www/erpex;
        try_files $uri $uri/ /erpex/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ERPEX API — proxy to Express backend
    location /erpex/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Default location for existing site
    location / {
        try_files $uri $uri/ =404;
    }
}
