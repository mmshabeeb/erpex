# ============================================================
# ERPEX — Nginx Configuration
# Serves frontend static files + proxies API to Express
# Add this as a location block to your existing elevatexnow.com server block
# ============================================================

# If you have a SEPARATE server block for elevatexnow.com, add these
# location blocks inside it. If not, use the full server block below.

# ─── Option A: Add to EXISTING server block ──────────────────
# Paste these location blocks inside your existing
# server { ... } block for elevatexnow.com:

#   # ERPEX Frontend (static files)
#   location /erpex {
#       root /var/www/erpex;
#       try_files $uri $uri/ /erpex/index.html;
#   }
